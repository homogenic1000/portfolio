    <div class="ruler" id="ruler"></div>

    <script>
        const cmWidth = 37.8; // pixels approximatifs pour 1 cm

        function generateRuler() {
            const ruler = document.getElementById('ruler');
            ruler.innerHTML = ""; // On vide la règle avant de la recréer

            const screenWidth = window.innerWidth;
            const numTicks = Math.floor(screenWidth / cmWidth);

            for (let i = 0; i <= numTicks; i++) {
                const tick = document.createElement('div');
                tick.classList.add('tick');
                tick.setAttribute('data-cm', i);
                ruler.appendChild(tick);
            }
        }

        // Générer la règle au chargement
        generateRuler();

        // Recalculer la règle au redimensionnement de la fenêtre
        window.addEventListener('resize', generateRuler);
    </script>
